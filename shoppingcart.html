<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <nav class="navbar">

            <div class="logo">
                <h2>Thala7</h2>
                <p>Classic shoes of all varieties</p>
            </div>

            <div class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                        <li><a href="product.html">Products</a></li>
                        <li><a href="product.html#about">About</a></li>
                        <li><a href="product.html#contact">Contact</a></li>
                </ul>
            </div>

            <div class="nav-right">
               <div class="cart">
                 <a href="shoppingcart.html">🛒</a>
               </div>
                <div class="profile">👤</div>
            </div>

        </nav>
    </div>
</header>

<main class="cart-page">

    <div class="container cart-container">

        <!-- Left Side -->

        <div class="cart-left">

            <h1>Shopping Cart</h1>

            <table class="cart-table">

                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>Seven By M.S. Dhoni Running Shoe</td>
                        <td>
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </td>
                        <td>₹4,999</td>
                        <td class="remove">✕</td>
                    </tr>
                    
                    <tr>
                        <td>AirMax Runner</td>
                        <td>
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </td>
                        <td>₹2,999</td>
                        <td class="remove">✕</td>
                    </tr>

                </tbody>

            </table>
            <h3 class="continue-shopping">
                <a href="product.html">&lt; Continue Shopping</a>
            </h3>

            

        </div>

        <!-- Right Side -->

        <div class="cart-right">

            <div class="summary-card">

                <label>Enter Coupon Code</label>

                <div class="coupon-box">
                    <input type="text" placeholder="COUPON CODE">
                    <button>Apply Coupon</button>
                </div>

                <div class="bill">

                    <div>
                        <span>Sub Total</span>
                        <span>₹7,998</span>
                    </div>

                    <div>
                        <span>Taxes</span>
                        <span>₹199</span>
                    </div>

                    <div>
                        <span>Discount</span>
                        <span>₹0</span>
                    </div>

                    <hr>

                    <div class="total">
                        <span>Total</span>
                        <span>₹8,197</span>
                    </div>

                </div>

            </div>

            <button class="pay-btn">
              <a href="payment.html" class="pay-btn">
    Pay Now ₹8,197
</a>
            </button>

            <div class="payment-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRV9cp2KfYnHEQUMAviaj3ptDB7CrQzp6tU9g&s" alt="pay-tm">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpb3Rl-U2KQEmxEKkNOZnJVH7nP8Am68S6vA&s" alt="razor-pay">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQq_S1I-kRo8EmqBe0MSfTSRdtAflozeeDoBQ&s" alt="gpay">
            </div>

        </div>

    </div>

</main>

</body>
</html>
